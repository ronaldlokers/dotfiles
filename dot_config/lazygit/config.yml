# lazygit ignores git's core.pager; delta must be wired up here.
# --paging=never because lazygit renders the output itself,
# --dark because delta can't detect the terminal background in a pipe.
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
  # commit.gpgsign makes lazygit drop to a terminal subprocess in case
  # signing needs a pinentry; our ssh key signs without prompting, so
  # stay in the UI
  overrideGpg: true

# Catppuccin Mocha (blue accent), from catppuccin/lazygit
gui:
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    searchingActiveBorderColor:
      - '#f9e2af'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    inactiveViewSelectedLineBgColor:
      - '#6c7086'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    cherryPickedCommitBgColor:
      - '#45475a'
    markedBaseCommitFgColor:
      - '#89b4fa'
    markedBaseCommitBgColor:
      - '#f9e2af'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
  authorColors:
    '*': '#b4befe'
