[tools]
bat = "0.26.1"
chezmoi = "2.70.5"
claude-code = "2.1.215"
fzf = "0.74.0"
lsd = "1.2.0"
fd = "10.4.2"
lazygit = "0.63.0"
node = "26.4.0"
# mason installs pip-backed packages (ruff) into a venv; without a
# python3 on PATH those installs fail
python = "3.14.6"
ripgrep = "15.1.0"
neovim = "0.12.4"
direnv = "2.37.1"
yq = "4.53.3"
jq = "1.8.2"
kubeconform = "0.8.0"
gemini-cli = "0.49.0"
delta = "0.19.2"
zoxide = "0.10.0"
gh = "2.96.0"
tmux = "3.7b"
# nvim-treesitter (main branch) shells out to the tree-sitter CLI to
# compile parsers; without it :TSUpdate fails and parsers go stale
tree-sitter = "0.26.11"
uv = "0.11.29"
# uvx_args: pomo imports typing_extensions but doesn't declare it; on
# python >=3.14 nothing pulls it in transitively anymore
"pipx:git+https://github.com/mischavandenburg/pomo.git" = { version = "v0.4.0", uvx_args = "--with typing-extensions" }

[settings]
# run pipx-backend tools through uvx so no system python/pipx is needed
pipx.uvx = true
