[tools]
bat = "0.26.1"
chezmoi = "2.70.5"
fzf = "0.74.0"
lsd = "1.2.0"
fd = "10.4.2"
lazygit = "0.63.0"
node = "26.4.0"
ripgrep = "15.1.0"
neovim = "0.12.4"
direnv = "2.37.1"
yq = "4.53.3"
jq = "1.8.2"
kubeconform = "0.8.0"
gemini-cli = "0.49.0"
delta = "0.19.2"
zoxide = "0.10.0"
gh = "2.96.0"
uv = "0.11.27"
# uvx_args: pomo imports typing_extensions but doesn't declare it; on
# python >=3.14 nothing pulls it in transitively anymore
"pipx:git+https://github.com/mischavandenburg/pomo.git" = { version = "latest", uvx_args = "--with typing-extensions" }

[settings]
# run pipx-backend tools through uvx so no system python/pipx is needed
pipx.uvx = true
