name: Renovate

on:
  schedule:
    # weekly, Monday 06:00 UTC; the second run automerges PRs whose CI
    # went green after the first (Renovate merges on its own runs)
    - cron: "0 6 * * 1"
    - cron: "0 9 * * 1"
  workflow_dispatch:

# Renovate authenticates with the RENOVATE_TOKEN PAT, not the workflow token
permissions: {}

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # repo config is committed at .github/renovate.json, skip onboarding PR
          RENOVATE_ONBOARDING: "false"
