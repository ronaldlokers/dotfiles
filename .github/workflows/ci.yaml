name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # weekly canary before the Renovate runs: externals and the chezmoi
    # installer can break independently of commits
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: shellcheck
        run: shellcheck --severity=warning setup .chezmoiscripts/*.sh.tmpl dot_claude/executable_statusline.sh dot_config/shell/ssh-agent.sh
      - name: validate claude settings.json
        run: jq empty dot_claude/settings.json
      - name: validate renovate config
        run: npx --yes --package renovate renovate-config-validator .github/renovate.json

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # scan the full history, not just the tip
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bootstrap:
    runs-on: ubuntu-latest
    env:
      # authenticate mise's GitHub API calls (release-tag lookups) with the
      # workflow token: unauthenticated requests share the runner IP's 60/hr
      # limit and intermittently 403, aborting the all-or-nothing install.
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: install zsh
        run: sudo apt-get update -q && sudo apt-get install -y -q zsh
      - name: install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$RUNNER_TEMP/bin"
      - name: bootstrap into a clean HOME
        run: |
          export PATH="$RUNNER_TEMP/bin:$PATH"
          TESTHOME="$(mktemp -d)"
          echo "TESTHOME=$TESTHOME" >> "$GITHUB_ENV"
          # CI has no passphrase and no tty, same as `devpod up` on a
          # fresh machine: the unlock script detects that and skips
          # decrypting the age identity and the secrets behind it.
          # Everything else runs for real: externals, run scripts, full
          # mise tool install.
          HOME="$TESTHOME" chezmoi init --source "$PWD"
          HOME="$TESTHOME" chezmoi apply --source "$PWD" </dev/null
      - name: idempotency — second apply changes no managed files
        run: |
          export PATH="$RUNNER_TEMP/bin:$PATH"
          # the design leans on re-run safety (the unlock script and every
          # run_onchange are meant to no-op once settled); prove it. A second
          # apply must exit 0 and leave no managed-file drift.
          HOME="$TESTHOME" chezmoi apply --source "$PWD" </dev/null
          # run_before_00-unlock-secrets is a plain run_before: it re-runs on
          # every apply by design, so chezmoi always lists it as ' R ...'.
          # That's expected — exclude scripts and assert no real file drift.
          pending="$(HOME="$TESTHOME" chezmoi status --source "$PWD" \
            | grep -v '\.chezmoiscripts/' || true)"
          if [ -n "$pending" ]; then
            echo "::error::managed files drift after a second apply — non-idempotent:"
            printf '%s\n' "$pending"
            exit 1
          fi
      - name: assert externals actually landed
        run: |
          # a network blip or upstream rename can leave empty external dirs;
          # the shells source them behind `[ -f ]` guards and stay silent, so
          # assert the real files exist rather than trusting apply's exit code.
          missing=0
          for f in \
            "$TESTHOME/.local/bin/mise" \
            "$TESTHOME/.zsh/pure/pure.zsh" \
            "$TESTHOME/.zsh/zsh-autosuggestions/zsh-autosuggestions.zsh" \
            "$TESTHOME/.zsh/fzf-tab/fzf-tab.plugin.zsh" \
            "$TESTHOME/.zsh/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh" \
            "$TESTHOME/.tmux/plugins/tmux-resurrect/resurrect.tmux" \
            "$TESTHOME/.config/k9s/skins/catppuccin-mocha.yaml"; do
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty external: $f"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]
      - name: smoke-test zsh startup
        run: |
          HOME="$TESTHOME" zsh -ic 'echo "zsh startup OK"'
      - name: smoke-test installed tools
        run: |
          export PATH="$TESTHOME/.local/bin:$PATH"
          # the old `mise ls | head -20` exited 0 regardless (head masks the
          # status), so a tool that failed to install still passed CI. Ask mise
          # directly which configured tools are missing — no hard-coded list to
          # drift from mise/config.toml, and no reliance on interactive-shell
          # PATH activation (which doesn't fire under `zsh -ic`).
          missing="$(HOME="$TESTHOME" mise ls --missing 2>/dev/null)"
          if [ -n "$missing" ]; then
            echo "::error::configured mise tools are not installed:"
            printf '%s\n' "$missing"
            exit 1
          fi
          echo "all configured mise tools installed"

  host-ssh-agent:
    # The bootstrap job runs the clean-HOME/container path, where there is no
    # systemd user session, so the host-only branch of
    # run_onchange_after_10-enable-ssh-agent (systemctl --user enable ...) and
    # the ssh-agent.service unit are never exercised. Bring up a real user
    # session and run that branch for real.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: bring up a systemd --user session
        run: |
          sudo loginctl enable-linger "$(id -un)"
          rt="/run/user/$(id -u)"
          for _ in $(seq 1 30); do [ -S "$rt/systemd/private" ] && break; sleep 1; done
          test -S "$rt/systemd/private" \
            || { echo "::error::user systemd session never came up"; exit 1; }
      - name: install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$RUNNER_TEMP/bin"
      - name: place the unit and run the real enable script
        run: |
          export PATH="$RUNNER_TEMP/bin:$PATH"
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          chezmoi init --source "$PWD"
          # the bootstrap job already tests that chezmoi *places* the unit; here
          # it just needs to be present so the enable script can start it.
          mkdir -p "$HOME/.config/systemd/user"
          cp dot_config/systemd/user/ssh-agent.service \
             "$HOME/.config/systemd/user/ssh-agent.service"
          chezmoi execute-template --source "$PWD" \
            < .chezmoiscripts/run_onchange_after_10-enable-ssh-agent.sh.tmpl \
            > "$RUNNER_TEMP/enable.sh"
          sh "$RUNNER_TEMP/enable.sh"
      - name: assert the ssh-agent service is active with a live socket
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user is-active --quiet ssh-agent.service
          test -S "$XDG_RUNTIME_DIR/ssh-agent.socket"
          echo "host-path ssh-agent verified: unit active, socket present"
